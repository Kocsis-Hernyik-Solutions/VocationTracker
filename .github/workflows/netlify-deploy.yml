name: Deploy to Netlify

on:
  push:
    branches:
      - main  # A branch, amely triggereli a workflow-t

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22  # Node.js verzió

    - name: Install dependencies
      run: npm install

    - name: Build Angular app
      run: npm run build -- --output-path=dist/vocation-tracker/browser

    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v2
      with:
        publish-dir: dist/vocation-tracker/browser
        production-deploy: true
      env:
        NETLIFY_AUTH_TOKEN: nfp_vC1ofprL6vwJXQwJobYyJxpWDtt4iQzT24a5