name: Deploy to Netlify

on:
  push:
    branches:
      - main  # A branch, amely változáskor triggereli a workflow-t

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22

    - name: Install dependencies
      run: npm install

    - name: Build the Angular app
      run: npm run build -- --output-path=dist/vocation-tracker/browser

    - name: Deploy to Netlify
      run: npx netlify deploy --auth nfp_vC1ofprL6vwJXQwJobYyJxpWDtt4iQzT24a5 --prod --dir=dist/vocation-tracker/browser